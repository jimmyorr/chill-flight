<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug | Sky & Weather</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-N6RGBLQCZ8"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-N6RGBLQCZ8');
    </script>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <script type="module" src="/src/main.js"></script>
    <style>
      :root {
        --bg-color: #0f172a;
        --sidebar-bg: #1e293b;
        --accent-color: #38bdf8;
        --text-color: #f1f5f9;
        --hover-color: #334155;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      #sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: 320px;
        height: 100vh;
        background-color: rgba(30, 41, 59, 0.85);
        backdrop-filter: blur(10px);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        overflow-y: auto;
        z-index: 10;
        padding: 20px;
        box-sizing: border-box;
      }

      h1 {
        font-size: 1.2rem;
        margin-bottom: 20px;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 2px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 10px;
      }

      .control-group {
        margin-bottom: 20px;
      }

      .control-group label {
        display: block;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
      }

      .control-group input[type='range'] {
        width: 100%;
        margin-bottom: 5px;
      }

      .control-group input[type='color'] {
        width: 100%;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        border-radius: 4px;
        cursor: pointer;
      }

      .value-display {
        font-size: 0.8rem;
        color: var(--accent-color);
        float: right;
      }

      .controls-hint {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.8rem;
        text-align: right;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>

  <body>
    <div id="sidebar">
      <h1>Sky & Weather Debug</h1>

      <div class="control-group">
        <label
          >Time of Day
          <span id="val-tod" class="value-display">05:30</span></label
        >
        <input
          type="range"
          id="tod-slider"
          min="0"
          max="6.28318"
          step="0.01"
          value="1.4399"
        />
      </div>

      <div class="control-group">
        <label
          >Cloud Density
          <span id="val-cloud" class="value-display">0.5</span></label
        >
        <input
          type="range"
          id="cloud-slider"
          min="0"
          max="1"
          step="0.01"
          value="0.5"
        />
      </div>

      <div class="control-group">
        <label
          >Aurora Intensity
          <span id="val-aurora" class="value-display">0.0</span></label
        >
        <input
          type="range"
          id="aurora-slider"
          min="0"
          max="1"
          step="0.01"
          value="0.0"
        />
      </div>

      <div class="control-group">
        <label>Top Color (Zenith)</label>
        <input type="color" id="color-top" value="#000000" />
      </div>

      <div class="control-group">
        <label>Bottom Color (Horizon)</label>
        <input type="color" id="color-bottom" value="#000000" />
      </div>
    </div>

    <div class="controls-hint">
      Left click to look around<br />
      Scroll to zoom
    </div>

    <!-- Mocks and Dependencies for game scripts -->
    <script type="module">
      window.CHUNK_SIZE = 1500;
      window.SEGMENTS = 40;
      window.WATER_LEVEL = 40;
      window.MOUNTAIN_LEVEL = 180;
      window.MAP_WORLD_SIZE = 10000;
      window.MAP_HEIGHT_SCALE = 400;

      window.ChillFlightLogic = {
        SCALE: 1,
        getPlaneColor: () => 0xe74c3c,
        SHOW_CLOUDS: true,
        SHOW_OBJECTS: true,
        THEME: 'standard',
        START_TIME_SPEED: 0,
        WORLD_SEED: 12345,
        mulberry32: function (a) {
          return function () {
            var t = (a += 0x6d2b79f5);
            t = Math.imul(t ^ (t >>> 15), t | 1);
            t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
            return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
          };
        },
      };
      window.simplex = {noise2D: () => 0};
      window.animationUniforms = {uTime: {value: 0}};
      window.waterUniforms = {uTime: {value: 0}};
      window.serverTimeOffset = 0;
    </script>

    <script defer src="chill-flight-logic.js"></script>
    <script defer src="constants.js"></script>
    <script defer src="terrain.js"></script>
    <script defer src="sky.js"></script>

    <script type="module">
      window.addEventListener('load', () => {
        // Setup OrbitControls
        camera.position.set(0, 2400, 4000); // Position camera near the clouds
        const controls = new window.THREE.OrbitControls(
          camera,
          renderer.domElement
        );
        controls.enableDamping = true;
        controls.enablePan = false;
        controls.target.set(0, 2400, 0); // Orbit around the center of the cloud cluster
        controls.update();
        // Initial values
        const todSlider = document.getElementById('tod-slider');
        const cloudSlider = document.getElementById('cloud-slider');
        const auroraSlider = document.getElementById('aurora-slider');
        const colorTop = document.getElementById('color-top');
        const colorBottom = document.getElementById('color-bottom');

        const valTod = document.getElementById('val-tod');
        const valCloud = document.getElementById('val-cloud');
        const valAurora = document.getElementById('val-aurora');

        // Initialize colors to the dynamically generated ones
        if (typeof selectedPalette !== 'undefined') {
          colorTop.value =
            '#' + selectedPalette.top.toString(16).padStart(6, '0');
          colorBottom.value =
            '#' + selectedPalette.bottom.toString(16).padStart(6, '0');
        }

        function formatTime(radians) {
          const normalized = radians % (Math.PI * 2);
          let hours = (normalized / (Math.PI * 2)) * 24;
          // The game offsets time (0 = midnight, PI = noon)
          hours = (hours + 24) % 24;
          const h = Math.floor(hours);
          const m = Math.floor((hours - h) * 60);
          return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }

        // Bindings
        todSlider.addEventListener('input', (e) => {
          timeOfDay = parseFloat(e.target.value);
          valTod.innerText = formatTime(timeOfDay);

          const sunDist = 20000;
          // Negative Z is North in THREE.js. So we map:
          // x = sin(tod), y = -cos(tod) (wait, sunrise is usually east. let's check sky.frag.glsl)
          // Game uses timeOfDay: 0 = midnight. Math.PI/2 = 6am. Math.PI = noon.
          const sx = Math.sin(timeOfDay);
          const sy = -Math.cos(timeOfDay);
          const sz = 0; // Fixed orbit

          const dir = new THREE.Vector3(sx, sy, sz).normalize();
          if (typeof skyUniforms !== 'undefined')
            skyUniforms.sunDirection.value.copy(dir);
          if (typeof sunUniforms !== 'undefined')
            sunUniforms.dayFactor.value = Math.max(
              0.0,
              Math.min(1.0, sy * 2.0 + 0.2)
            );

          if (typeof dirLight !== 'undefined') {
            dirLight.position.set(
              dir.x * sunDist,
              dir.y * sunDist,
              dir.z * sunDist
            );

            const dayFactor = Math.max(0, Math.min(1, sy * 2.0 + 0.5));
            const dawnDuskFactor = Math.max(
              0,
              Math.pow(1.0 - Math.min(1, Math.abs(sy) * 2.5), 1.5)
            );

            const dayLightCol = new THREE.Color(0xfff0dd);
            const sunsetLightCol =
              sx > 0 ? new THREE.Color(0xffd5a0) : new THREE.Color(0xffad60);
            dirLight.color
              .copy(dayLightCol)
              .lerp(sunsetLightCol, dawnDuskFactor);
            dirLight.intensity = Math.max(0.05, 0.8 * dayFactor);
          }
        });

        cloudSlider.addEventListener('input', (e) => {
          const val = parseFloat(e.target.value);
          if (typeof skyUniforms !== 'undefined')
            skyUniforms.uCloudDensity.value = val;
          if (typeof sunUniforms !== 'undefined')
            sunUniforms.overcast.value = val;

          valCloud.innerText = val.toFixed(2);
        });

        auroraSlider.addEventListener('input', (e) => {
          const val = parseFloat(e.target.value);
          skyUniforms.uAuroraIntensity.value = val;
          valAurora.innerText = val.toFixed(2);
        });

        colorTop.addEventListener('input', (e) => {
          applyCustomSkyColors(e.target.value, colorBottom.value);
        });

        colorBottom.addEventListener('input', (e) => {
          applyCustomSkyColors(colorTop.value, e.target.value);
        });

        // Trigger initial time to set sun position
        todSlider.dispatchEvent(new Event('input'));

        // Render loop
        function animate() {
          requestAnimationFrame(animate);
          controls.update();

          const time = performance.now() * 0.001;

          if (window.skyUniforms) {
            window.skyUniforms.uTime.value = time;
          }
          if (window.sunUniforms) window.sunUniforms.uTime.value = time;
          if (window.moonUniforms) window.moonUniforms.uTime.value = time;

          renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        });
      });
    </script>
  </body>
</html>
