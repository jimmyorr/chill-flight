    <style>
      :root {
        --bg-color: #0f172a;
        --sidebar-bg: #1e293b;
        --accent-color: #38bdf8;
        --text-color: #f1f5f9;
        --hover-color: #334155;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
        display: flex;
      }

      #sidebar {
        width: 300px;
        height: 100vh;
        background-color: var(--sidebar-bg);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        overflow-y: auto;
        z-index: 10;
        padding: 20px;
        box-sizing: border-box;
      }

      #viewer {
        flex-grow: 1;
        height: 100vh;
        position: relative;
      }

      h1 {
        font-size: 1.2rem;
        margin-bottom: 20px;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 2px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 10px;
      }

      .category-title {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.5);
        margin: 20px 0 10px 0;
      }

      .model-btn {
        display: block;
        width: 100%;
        padding: 10px 15px;
        margin-bottom: 5px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 6px;
        color: var(--text-color);
        text-align: left;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.9rem;
      }

      .model-btn:hover {
        background-color: var(--hover-color);
        border-color: var(--accent-color);
      }

      .model-btn.active {
        background-color: var(--accent-color);
        color: var(--bg-color);
        font-weight: bold;
      }

      #info {
        position: absolute;
        bottom: 20px;
        left: 320px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 0.8rem;
        pointer-events: none;
      }

      .controls-hint {
        position: absolute;
        top: 20px;
        right: 20px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 0.8rem;
        text-align: right;
      }

      /* Scrollbar styling */
      #sidebar::-webkit-scrollbar {
        width: 6px;
      }

      #sidebar::-webkit-scrollbar-track {
        background: transparent;
      }

      #sidebar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
      }

      #sidebar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }
    </style>
    <script type="module" crossorigin src="./assets/debugModels--0YTCOQq.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/main-WxT0f0wG.js">
  </head>
