<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chill Flight Debug</title>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <style>
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Courier New', Courier, monospace;
        color: white;
        /* Subtle static dark gradient to ensure readability */
        background: linear-gradient(-45deg, #1a1a2e, #051f15, #1a0526, #0f172a);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
      }

      @keyframes gradientBG {
        0% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
        100% {
          background-position: 0% 50%;
        }
      }

      .debug-menu-box {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 30px;
        font-weight: 300;
        letter-spacing: 4px;
        font-size: 24px;
      }

      .debug-btn {
        display: block;
        width: 100%;
        margin-bottom: 15px;
        color: white;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 6px;
        padding: 15px 20px;
        font-size: 16px;
        letter-spacing: 2px;
        transition: all 0.2s;
        box-sizing: border-box;
      }

      .debug-btn:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }

      .debug-btn:last-child {
        margin-bottom: 0;
      }
    </style>
    <link rel="stylesheet" crossorigin href="./assets/style-B19Nzwi7.css">
  </head>
  <body>
    <div class="debug-menu-box">
      <h1>DEBUG TOOLS</h1>
      <a href="debug-models.html" class="debug-btn">MODELS</a>
      <a href="debug-sky.html" class="debug-btn">SKY</a>
      <a
        href="index.html"
        class="debug-btn"
        style="margin-top: 30px; background: rgba(0, 0, 0, 0.4)"
        >RETURN TO GAME</a
      >
    </div>
  </body>
</html>
