<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debug | Sky & Weather</title>
    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-N6RGBLQCZ8"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-N6RGBLQCZ8');
    </script>
    <link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
    <style>
      :root {
        --bg-color: #0f172a;
        --sidebar-bg: #1e293b;
        --accent-color: #38bdf8;
        --text-color: #f1f5f9;
        --hover-color: #334155;
      }

      body {
        margin: 0;
        padding: 0;
        font-family:
          'Inter',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        overflow: hidden;
      }

      #sidebar {
        position: absolute;
        top: 0;
        left: 0;
        width: 320px;
        height: 100vh;
        background-color: rgba(30, 41, 59, 0.85);
        backdrop-filter: blur(10px);
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        overflow-y: auto;
        z-index: 10;
        padding: 20px;
        box-sizing: border-box;
      }

      h1 {
        font-size: 1.2rem;
        margin-bottom: 20px;
        color: var(--accent-color);
        text-transform: uppercase;
        letter-spacing: 2px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 10px;
      }

      .control-group {
        margin-bottom: 20px;
      }

      .control-group label {
        display: block;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
      }

      .control-group input[type='range'] {
        width: 100%;
        margin-bottom: 5px;
      }

      .control-group input[type='color'] {
        width: 100%;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: transparent;
        border-radius: 4px;
        cursor: pointer;
      }

      .value-display {
        font-size: 0.8rem;
        color: var(--accent-color);
        float: right;
      }

      .controls-hint {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(8px);
        padding: 15px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: rgba(255, 255, 255, 0.8);
        font-size: 0.8rem;
        text-align: right;
        pointer-events: none;
        z-index: 10;
      }
    </style>
    <script type="module" crossorigin src="./assets/debugSky-Dvx4HBxs.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/main-BGsiWArJ.js">
  </head>

  <body>
    <div id="sidebar">
      <h1>Sky & Weather Debug</h1>

      <div class="control-group">
        <label
          >Time of Day
          <span id="val-tod" class="value-display">05:30</span></label
        >
        <input
          type="range"
          id="tod-slider"
          min="0"
          max="6.28318"
          step="0.01"
          value="1.4399"
        />
      </div>

      <div class="control-group">
        <label
          >Cloud Density
          <span id="val-cloud" class="value-display">0.5</span></label
        >
        <input
          type="range"
          id="cloud-slider"
          min="0"
          max="1"
          step="0.01"
          value="0.5"
        />
      </div>

      <div class="control-group">
        <label
          >Aurora Intensity
          <span id="val-aurora" class="value-display">0.0</span></label
        >
        <input
          type="range"
          id="aurora-slider"
          min="0"
          max="1"
          step="0.01"
          value="0.0"
        />
      </div>

      <div class="control-group">
        <button
          id="btn-random-palette"
          style="
            width: 100%;
            padding: 10px;
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          RANDOMIZE PALETTE
        </button>
      </div>
    </div>

    <div class="controls-hint">
      Left click to look around<br />
      Scroll to zoom
    </div>

    <!-- Mocks and Dependencies for game scripts -->

        <!-- Optimized Game Bundle -->
    <script defer src="debug-sky-bundle.js"></script>
</body>
</html>
