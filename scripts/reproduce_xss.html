<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>XSS Reproduction - Chill Flight</title>
    <style>
        body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
        .player-entry { border: 1px solid #444; padding: 10px; margin-bottom: 10px; }
        .player-name { font-weight: bold; color: #00ffcc; }
        #player-list { margin-top: 20px; }
        #status { color: #ff4444; font-weight: bold; }
    </style>
</head>
<body>
    <h1>XSS Reproduction</h1>
    <p>This page simulates the vulnerable <code>updatePlayerList</code> logic in <code>game.js</code>.</p>
    
    <div id="player-list"></div>
    <div id="status"></div>

    <script>
        // Vulnerable payload: a name that includes a script tag
        const maliciousName = "Attacker <img src=x onerror=\"document.getElementById('status').innerText = 'XSS EXECUTED SUCCESSFULLY!'; console.log('XSS Success');\">";
        
        const players = [
            { name: maliciousName, dist: 100, dir: '↑', isSelf: false, uid: 'attacker-123' }
        ];

        function simulateUpdatePlayerList(top5) {
            const listEl = document.getElementById('player-list');
            
            // This is the EXACT logic from game.js L1783-1791 (before the fix)
            listEl.innerHTML = top5.map(p => `
                <div class="player-entry ${p.isSelf ? 'player-self' : ''}" ${p.uid ? `data-uid="${p.uid}"` : ''}>
                    <span class="player-name">${p.name}</span>
                    <div class="player-info">
                        <span class="player-dist">${p.isSelf ? '-' : Math.round(p.dist) + 'm'}</span>
                        <span class="player-dir">${p.isSelf ? '-' : p.dir}</span>
                    </div>
                </div>
            `).join('');
        }

        console.log("Running simulation...");
        simulateUpdatePlayerList(players);
    </script>
</body>
</html>
